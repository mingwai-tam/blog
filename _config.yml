# Site settings
title: Ming-Wai's Blog
email: ming-wai.tam@outlook.com
description: A blog about technology, learning, and ideas
baseurl: "/blog"
url: "https://mingwai-tam.github.io"
twitter_username: ming_wai_tam
github_username: mingwai-tam

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Markdown settings
markdown: kramdown
highlighter: rouge

# Collections
collections:
  posts:
    output: true
    permalink: /:collection/:year/:month/:day/:slug/

# Pagination
paginate: 10
paginate_path: "/page:num/"

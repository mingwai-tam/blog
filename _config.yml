# Site settings
title: My Blog
email: your-email@example.com
description: A blog built with Jekyll
baseurl: "/blog"
url: "https://yourusername.github.io"
twitter_username: your-twitter
github_username: your-github

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Markdown settings
markdown: kramdown
highlighter: rouge

# Collections
collections:
  posts:
    output: true
    permalink: /:collection/:year/:month/:day/:slug/

# Pagination
paginate: 10
paginate_path: "/page:num/"
